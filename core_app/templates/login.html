<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>i-emhana.kz | Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .login-logo {
            font-size: 2.5rem;
            color: #0d6efd;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-sm-8">
                <div class="card login-card p-4">
                    <div class="card-body">
                        <div class="text-center mb-4">
                            <i class="fa-solid fa-staff-snake login-logo"></i>
                            <h4 class="fw-bold mt-2 mb-0">i-emhana.kz</h4>
                            <p class="text-muted small">Медицинская информационная система</p>
                        </div>

                        {% if form.errors %}
                        <div class="alert alert-danger">
                            <i class="fa-solid fa-circle-exclamation me-1"></i>
                            Неверный логин или пароль.
                        </div>
                        {% endif %}

                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="id_username" class="form-label fw-semibold">
                                    <i class="fa-solid fa-user me-1 text-primary"></i>Логин
                                </label>
                                <input type="text" name="username" id="id_username"
                                       class="form-control form-control-lg"
                                       placeholder="Введите логин" autofocus required>
                            </div>
                            <div class="mb-4">
                                <label for="id_password" class="form-label fw-semibold">
                                    <i class="fa-solid fa-lock me-1 text-primary"></i>Пароль
                                </label>
                                <input type="password" name="password" id="id_password"
                                       class="form-control form-control-lg"
                                       placeholder="Введите пароль" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <i class="fa-solid fa-right-to-bracket me-2"></i>Войти
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
